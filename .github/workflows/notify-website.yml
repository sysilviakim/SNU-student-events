name: Notify website

on:
  push:
    branches: [main]
    paths:
      - events.yml
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger website rebuild
        env:
          WEBSITE_DISPATCH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$WEBSITE_DISPATCH_TOKEN" ]; then
            echo "WEBSITE_DISPATCH_TOKEN is not set."
            echo "Add a fine-grained GitHub token as a repository secret in SNU-student-events."
            exit 1
          fi

          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $WEBSITE_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/sysilviakim/sysilviakim.github.io/dispatches \
            -d '{"event_type":"events-updated"}'
