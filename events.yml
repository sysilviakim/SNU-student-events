- title: "[대학원생 맞춤형 연구역량 프로그램] R을 활용한 양적연구: 적용, 해석, 보고, 시각화를 중심으로"
  date: "2026-06-18"
  time: "12:00-15:00"
  location: "TBD"
  organizer: "대학원 자치회, 김서영"
  description: "본 강의는 대학원생의 연구역량 함양을 위한 맞춤형 학습지원 프로그램의 일환으로, 정치학 석·박사과정 학생들이 R을 활용하여 양적연구 결과를 도출한 후 해석, 보고, 시각화하는 방법을 3시간 동안 압축적으로 다룬다. 이를테면 표와 그래프를 논문·학회발표·연구계획서에 맞게 어떻게 정리할 것인지, 재현 가능한 분석 산출물을 어떻게 관리할 것인지, AI 보조 도구를 활용하여 분석 코드와 결과 해석을 어떻게 점검할 것인지 등을 함께 살펴본다."
  status: "published"


