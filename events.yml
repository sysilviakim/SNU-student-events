- title: "[대학원생 맞춤형 연구역량 프로그램] 양적연구 입문자를 위한 방법론 특강: 좋은 연구질문 발굴하고 발전시키는 법"
  date: "2026-06-03"
  time: "12:00-15:00"
  location: "TBD"
  organizer: "대학원 자치회, 김지은"
  description: "이 강의에서는 양적 연구를 시작하는 두 가지 출발점—(1) 머릿속에 연구질문이 있을 때, (2) 손에 데이터가 있을 때—에서 각각 어떻게 연구를 진행해야 하는지를 사례 중심으로 알아본다. 전반부에서는 연구질문이 있을 때 적절하게 연구설계를 하고 필요한 데이터를 찾거나 만드는 방법을, 후반부에서는 데이터가 있을 때 흥미로운 연구질문을 발굴하고 다듬는 방법을 소개한다. 최신 논문들을 사례로 활용하여, 자주 쓰이는 연구설계(단순회귀, 이중차분, 회귀불연속 등)와 다양한 데이터 유형(서베이, 정부문서, 국제기구데이터 등)을 두루 다룬다."
  status: "published"


